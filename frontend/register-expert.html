<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация эксперта — DomPro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Стать экспертом</h1>
      <p class="lead">Создайте аккаунт и заполните профиль для верификации</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="full_name">ФИО</label>
          <input id="full_name" name="full_name" required placeholder="Иван Петров" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="form-group">
          <label for="phone">Телефон</label>
          <input id="phone" name="phone" type="tel" required placeholder="+79001234567" />
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input id="password" name="password" type="password" required minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>

      <p class="form-footer">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>
  <script type="module" src="js/pages/register-expert.js"></script>
</body>
</html>
